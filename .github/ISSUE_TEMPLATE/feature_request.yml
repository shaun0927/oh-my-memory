name: Feature request
description: Propose a new capability for oh-my-memory
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real memory-management problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should oh-my-memory do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Could this harm active user workflows? How should it be guarded?
